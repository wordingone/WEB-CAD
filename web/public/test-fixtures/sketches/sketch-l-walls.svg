<svg xmlns="http://www.w3.org/2000/svg" width="400" height="350" viewBox="0 0 400 350">
  <rect width="400" height="350" fill="#f5f5f0"/>
  <!-- L-shaped walls plan sketch — 8m × 6m arms, 0.25m thick walls -->
  <!-- Horizontal arm (X direction, 8m) -->
  <rect x="50" y="60" width="270" height="22" fill="none" stroke="#222" stroke-width="2.5"/>
  <line x1="80"  y1="60" x2="80"  y2="82" stroke="#444" stroke-width="0.8"/>
  <line x1="120" y1="60" x2="120" y2="82" stroke="#444" stroke-width="0.8"/>
  <line x1="160" y1="60" x2="160" y2="82" stroke="#444" stroke-width="0.8"/>
  <line x1="200" y1="60" x2="200" y2="82" stroke="#444" stroke-width="0.8"/>
  <line x1="240" y1="60" x2="240" y2="82" stroke="#444" stroke-width="0.8"/>
  <line x1="280" y1="60" x2="280" y2="82" stroke="#444" stroke-width="0.8"/>
  <!-- Vertical arm (Y direction, 6m) - shares top-left corner with horiz arm -->
  <rect x="50" y="82" width="22" height="195" fill="none" stroke="#222" stroke-width="2.5"/>
  <line x1="50" y1="120" x2="72" y2="120" stroke="#444" stroke-width="0.8"/>
  <line x1="50" y1="160" x2="72" y2="160" stroke="#444" stroke-width="0.8"/>
  <line x1="50" y1="200" x2="72" y2="200" stroke="#444" stroke-width="0.8"/>
  <line x1="50" y1="240" x2="72" y2="240" stroke="#444" stroke-width="0.8"/>
  <!-- Corner fill (solid block at junction) -->
  <rect x="50" y="60" width="22" height="22" fill="#ccc" stroke="#222" stroke-width="2.5"/>
  <!-- Dimension: horizontal arm -->
  <line x1="50"  y1="35" x2="320" y2="35" stroke="#555" stroke-width="1"/>
  <line x1="50"  y1="30" x2="50"  y2="40" stroke="#555" stroke-width="1"/>
  <line x1="320" y1="30" x2="320" y2="40" stroke="#555" stroke-width="1"/>
  <text x="185" y="25" text-anchor="middle" font-family="monospace" font-size="13" fill="#333">8m</text>
  <!-- Dimension: vertical arm -->
  <line x1="370" y1="60" x2="370" y2="277" stroke="#555" stroke-width="1"/>
  <line x1="365" y1="60"  x2="375" y2="60"  stroke="#555" stroke-width="1"/>
  <line x1="365" y1="277" x2="375" y2="277" stroke="#555" stroke-width="1"/>
  <text x="385" y="175" text-anchor="middle" font-family="monospace" font-size="13" fill="#333" transform="rotate(90,385,175)">6m</text>
  <!-- Label -->
  <text x="200" y="320" text-anchor="middle" font-family="monospace" font-size="14" fill="#222">L-WALLS · 8m + 6m · 0.25m thick · 3m high</text>
  <text x="200" y="340" text-anchor="middle" font-family="monospace" font-size="10" fill="#777">plan view — fuse two walls</text>
</svg>
