<svg xmlns="http://www.w3.org/2000/svg" width="400" height="350" viewBox="0 0 400 350">
  <rect width="400" height="350" fill="#f5f5f0"/>
  <!-- Four-walled room plan sketch — 6m × 4m, 0.2m thick walls -->
  <!-- North wall -->
  <rect x="60" y="60" width="280" height="20" fill="none" stroke="#222" stroke-width="2.5"/>
  <line x1="80"  y1="60" x2="80"  y2="80" stroke="#444" stroke-width="0.8"/>
  <line x1="120" y1="60" x2="120" y2="80" stroke="#444" stroke-width="0.8"/>
  <line x1="160" y1="60" x2="160" y2="80" stroke="#444" stroke-width="0.8"/>
  <line x1="200" y1="60" x2="200" y2="80" stroke="#444" stroke-width="0.8"/>
  <line x1="240" y1="60" x2="240" y2="80" stroke="#444" stroke-width="0.8"/>
  <line x1="280" y1="60" x2="280" y2="80" stroke="#444" stroke-width="0.8"/>
  <line x1="320" y1="60" x2="320" y2="80" stroke="#444" stroke-width="0.8"/>
  <!-- South wall -->
  <rect x="60" y="270" width="280" height="20" fill="none" stroke="#222" stroke-width="2.5"/>
  <line x1="80"  y1="270" x2="80"  y2="290" stroke="#444" stroke-width="0.8"/>
  <line x1="120" y1="270" x2="120" y2="290" stroke="#444" stroke-width="0.8"/>
  <line x1="160" y1="270" x2="160" y2="290" stroke="#444" stroke-width="0.8"/>
  <line x1="200" y1="270" x2="200" y2="290" stroke="#444" stroke-width="0.8"/>
  <line x1="240" y1="270" x2="240" y2="290" stroke="#444" stroke-width="0.8"/>
  <line x1="280" y1="270" x2="280" y2="290" stroke="#444" stroke-width="0.8"/>
  <line x1="320" y1="270" x2="320" y2="290" stroke="#444" stroke-width="0.8"/>
  <!-- West wall -->
  <rect x="60" y="80" width="20" height="190" fill="none" stroke="#222" stroke-width="2.5"/>
  <line x1="60" y1="110" x2="80" y2="110" stroke="#444" stroke-width="0.8"/>
  <line x1="60" y1="150" x2="80" y2="150" stroke="#444" stroke-width="0.8"/>
  <line x1="60" y1="190" x2="80" y2="190" stroke="#444" stroke-width="0.8"/>
  <line x1="60" y1="230" x2="80" y2="230" stroke="#444" stroke-width="0.8"/>
  <!-- East wall -->
  <rect x="320" y="80" width="20" height="190" fill="none" stroke="#222" stroke-width="2.5"/>
  <line x1="320" y1="110" x2="340" y2="110" stroke="#444" stroke-width="0.8"/>
  <line x1="320" y1="150" x2="340" y2="150" stroke="#444" stroke-width="0.8"/>
  <line x1="320" y1="190" x2="340" y2="190" stroke="#444" stroke-width="0.8"/>
  <line x1="320" y1="230" x2="340" y2="230" stroke="#444" stroke-width="0.8"/>
  <!-- Interior open -->
  <rect x="80" y="80" width="240" height="190" fill="white" stroke="none"/>
  <!-- Dimension lines -->
  <line x1="60" y1="315" x2="340" y2="315" stroke="#555" stroke-width="1"/>
  <line x1="60" y1="310" x2="60" y2="320" stroke="#555" stroke-width="1"/>
  <line x1="340" y1="310" x2="340" y2="320" stroke="#555" stroke-width="1"/>
  <text x="200" y="330" text-anchor="middle" font-family="monospace" font-size="13" fill="#333">6m</text>
  <line x1="14" y1="60" x2="14" y2="290" stroke="#555" stroke-width="1"/>
  <line x1="9" y1="60" x2="19" y2="60" stroke="#555" stroke-width="1"/>
  <line x1="9" y1="290" x2="19" y2="290" stroke="#555" stroke-width="1"/>
  <text x="8" y="180" text-anchor="middle" font-family="monospace" font-size="13" fill="#333" transform="rotate(-90,8,180)">4m</text>
  <text x="200" y="30" text-anchor="middle" font-family="monospace" font-size="14" fill="#222">ROOM · 6m × 4m · 0.2m walls · 2.8m high</text>
  <text x="200" y="175" text-anchor="middle" font-family="monospace" font-size="11" fill="#aaa">interior</text>
</svg>
