        type: object_id
    required: [outer, inner]
  topology_role: solid
  kg_predicates: [hosts]
  synonyms: [diff-index-map, difference-with-map, cut-indexed, subtract-indexed]
  kernel: replicad
  alias_source: generic_cad_vocabulary

