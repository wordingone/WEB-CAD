  synonyms: [bool-subtract, boolsubtract, subtract-solid]
  note: "Short-form subtract verb from #246. outer − inner; removes both, returns created UUID."
  alias_source: agent_dispatch

- name: SdBoolIntersect
  kernel_op: boolintersect
  parameters:
    type: object
    properties:
      a:
        description: "[required] UUID of first solid"
        type: object_id
      b:
        description: "[required] UUID of second solid"
        type: object_id
    required: [a, b]
  topology_role: solid
  kg_predicates: []
  synonyms: [boolintersect]
  note: "Short-form intersect verb from #246. Keeps shared volume; removes both inputs, returns created UUID."
  alias_source: agent_dispatch

