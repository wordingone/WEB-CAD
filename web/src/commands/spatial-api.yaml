# Spatial Dictionary — WEB-CAD canonical vocabulary
#
# Hybrid schema: IFC4 entity classes as canonical names + generic CAD verbs
# as synonyms + Gemma-NL phrasings as additional synonyms. Per the project's
# copyright-safe alias strategy (see spatial-api.LICENSE.md), all
# synonyms are unprotectable functional verbs (Lotus v. Borland, scènes à
# faire, merger doctrine). No vendor-trademarked compound tokens.
#
# Schema per row:
#   name           : string  — IFC4 entity OR an SD-defined kernel verb
#   ifc4_class     : string? — buildingSMART IFC4 entity name when applicable
#   kernel_op      : string  — internal SD-defined op name (used by dispatch)
#   parameters     : object  — JSON Schema: { type: object, properties: { <name>: { type, description?, unit?, default? } }, required: [<name>...] }
#   topology_role  : enum    — host | hosted | void | face | edge | solid |
#                              compound | curve | surface | annotation |
#                              transform | view | selection | system
#   kg_predicates  : list    — predicate names this verb writes to the KG
#   synonyms       : list    — generic CAD verbs + NL phrasings (NO BRANDS)
#   hotkey         : string? — single keystroke binding
#   kernel         : enum    — replicad | nurbs-webgpu  (T17 dual-kernel)
#   alias_source   : string  — must be "generic_cad_vocabulary"
#
# Categories (ordered):
#   §1 Sketch primitives        (line, arc, circle, polygon, polyline, rect, ellipse, spline)
#   §2 Solid primitives         (box, cylinder, sphere, cone, prism)
#   §3 Solid creation           (extrude, revolve, sweep, loft)
#   §4 Boolean ops              (union, difference, intersection)
#   §5 Edge / surface ops       (fillet, chamfer, offset, trim, extend, split, shell)
#   §6 Transform                (move, rotate, scale, mirror, array)
#   §7 Architectural            (wall, slab, column, beam, stair, door, window, roof, space)
#   §8 Annotation               (dimension, leader, text)
#   §9 Group / layer            (group, ungroup, layer, lock, hide)
#   §10 Selection               (select, selectAll, deselect, isolate)
#   §11 View / navigation       (zoomExtents, zoomSelected, ortho, perspective)
#   §12 Analysis                (measure, area, volume)
#   §13 IO                      (import, export, save, open)

# ============================================================
# §1 Sketch primitives
# ============================================================

- name: SdLine
  kernel_op: drawLine
  parameters:
    type: object
    properties:
      start:
        type: point2
      end:
        type: point2
    required: [start, end]
  topology_role: edge
  kg_predicates: []
  synonyms: [line, drawline, l, segment]
  hotkey: L
  kernel: replicad
  alias_source: generic_cad_vocabulary

- name: SdArc
  kernel_op: drawArc
  parameters:
    type: object
