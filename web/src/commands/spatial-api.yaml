- name: SdEllipse
  kernel_op: drawEllipse
  parameters:
    type: object
    properties:
      center:
        type: point2
      rx:
        type: number
        unit: m
        default: 1
      ry:
        type: number
        unit: m
        default: 0.5
    required: []
  topology_role: edge
  kg_predicates: []
  synonyms: [ellipse, oval]
  kernel: nurbs-webgpu
  alias_source: generic_cad_vocabulary

- name: SdCurve
  kernel_op: drawCurve
  parameters:
    type: object
    properties:
      points:
        type: list_point2
      closed:
        type: boolean
        default: false
    required: [points]
