- name: SdWall
  ifc4_class: IfcWall
  kernel_op: makeWall
  parameters:
    type: object
    properties:
      profile:
        type: polyline
      start:
        type: point
        description: "Start point {x,y,z}. Alternative to profile."
      end:
        type: point
        description: "End point {x,y,z}. Alternative to profile."
      length:
        type: number
        unit: m
        default: 4
      thickness:
        type: number
        unit: m
        default: 0.2
      height:
        type: number
        unit: m
        default: 3
      level:
        type: string
        description: "Level ID or name. Overrides active level."
      layer:
        type: string
        description: "Layer ID to override automatic creator-to-layer routing."
    required: []
  topology_role: host
  kg_predicates: [hosts, containedIn, bounds]
  synonyms: [wall, makewall, drawwall, w, IfcWall, wall-polyline, wall-pick]
