# ── Issue #323 verbs ────────────────────────────────────────────
# s323-schema.yaml.part — Schema fragment for #323 (S3 surface creation).
#
# Merge target: web/src/commands/spatial-api.yaml §3 (after existing surface ops).
# All entries follow the schema format in spatial-api.yaml header.

# ============================================================
# §3b Surface creation — NURBS + analytic (from #323)
# ============================================================

- name: SdNurbsSurfaceFromGrid
  kernel_op: nurbsSurfaceFromGrid
  parameters:
    type: object
    properties:
      controlPoints:
        type: array
        description: "[required] Flat row-major array of [x,y,z] control point triples, nU×nV total"
      nU:
        type: integer
        description: "[required] Number of control point rows in U direction (≥ 2)"
      nV:
        type: integer
        description: "[required] Number of control point columns in V direction (≥ 2)"
      degreeU:
        type: integer
        default: 3
        description: "[optional] NURBS degree in U (1 ≤ degreeU ≤ nU-1, default 3)"
      degreeV:
        type: integer
        default: 3
        description: "[optional] NURBS degree in V (1 ≤ degreeV ≤ nV-1, default 3)"
      knotsU:
        type: array
        description: "[optional] Knot vector in U direction — length must equal nU+degreeU-1 (OpenNURBS convention). Clamped uniform generated if omitted."
      knotsV:
        type: array
        description: "[optional] Knot vector in V direction — length must equal nV+degreeV-1. Clamped uniform generated if omitted."
      weights:
        type: array
        description: "[optional] Rational weights — flat array of nU×nV positive numbers. Omit for non-rational (all weights=1)."
    required: [controlPoints, nU, nV]
  topology_role: face
  kg_predicates: []
  synonyms: [nurbs-surface, nurbssurface, srfgrid, surface-from-grid, addnurbssurface]
  kernel: nurbs-webgpu
  alias_source: generic_cad_vocabulary
  note: "Constructs a rational or non-rational NURBS surface from caller-supplied CV grid + knots. General: arbitrary degree, rational weights, custom knots. oracle: verb-nurbs de Boor parity at tolerance 1e-5."

- name: SdNurbsSurfaceEvaluate
  kernel_op: nurbsSurfaceEvaluate
  parameters:
    type: object
    properties:
      object_id:
        type: string
        description: "[required] UUID of an existing surface object in the scene"
      u:
        type: number
        description: "[required] Parameter value in U (within domainU of the surface)"
      v:
        type: number
        description: "[required] Parameter value in V (within domainV of the surface)"
    required: [object_id, u, v]
  topology_role: face
  kg_predicates: []
  synonyms: [evaluate-surface, surface-point, srfpt, evalsrf]
  kernel: nurbs-webgpu
  alias_source: generic_cad_vocabulary
  note: "Returns point [x,y,z] at surface parameter (u,v). No scene geometry created. oracle: de Boor exact for NurbsSurface; closed-form for RevSurface."

- name: SdNurbsSurfaceNormal
  kernel_op: nurbsSurfaceNormal
  parameters:
    type: object
    properties:
      object_id:
        type: string
        description: "[required] UUID of an existing surface object in the scene"
      u:
        type: number
        description: "[required] Parameter value in U"
      v:
        type: number
        description: "[required] Parameter value in V"
    required: [object_id, u, v]
  topology_role: face
  kg_predicates: []
  synonyms: [surface-normal, srfnormal, normal-at-uv, evalnormal]
  kernel: nurbs-webgpu
  alias_source: generic_cad_vocabulary
  note: "Returns unit normal vector [nx,ny,nz] at surface parameter (u,v). No scene geometry created. oracle: numerical central-difference cross product."

- name: SdNurbsSurfaceDerivatives
  kernel_op: nurbsSurfaceDerivatives
  parameters:
    type: object
    properties:
      object_id:
        type: string
        description: "[required] UUID of an existing surface object in the scene"
      u:
        type: number
        description: "[required] Parameter value in U"
      v:
        type: number
        description: "[required] Parameter value in V"
      order:
        type: integer
        default: 1
        description: "[optional] Derivative order: 1 returns dU+dV; 2 also returns d2U+d2V+dUV. Default 1."
    required: [object_id, u, v]
  topology_role: face
  kg_predicates: []
  synonyms: [surface-derivatives, srfderivs, evalsrfderivs, srf-tangent]
  kernel: nurbs-webgpu
  alias_source: generic_cad_vocabulary
  note: "Returns partial derivatives at surface parameter (u,v). order=1: dU, dV. order=2: adds d2U, d2V, dUV. oracle: numerical finite-difference."

- name: SdTorusSurface
  kernel_op: torusSurface
  parameters:
    type: object
    properties:
      majorRadius:
        type: number
        unit: m
        default: 1
        description: "[required unit=m default=1] Distance from torus center to tube center"
      minorRadius:
        type: number
        unit: m
        default: 0.3
        description: "[required unit=m default=0.3] Tube radius (must be < majorRadius)"
      center:
        type: point3
        description: "[optional] World-space center of the torus. Default: origin, offset by minorRadius along active CPlane normal."
    required: []
  topology_role: face
  kg_predicates: []
  synonyms: [torus, ring-surface, donut, torus-srf, addtorus]
  kernel: nurbs-webgpu
  alias_source: generic_cad_vocabulary
  note: "Creates a torus as a RevSurface (circle profile revolved around Z). oracle: closed-form P(u,v) = ((R+r·cos(v))·cos(u), (R+r·cos(v))·sin(u), r·sin(v)) at tolerance 1e-5."

- name: SdSumSurface
  kernel_op: sumSurface
  parameters:
    type: object
    properties:
      curve_u_id:
        type: string
        description: "[required] UUID of canonical curve defining U direction"
      curve_v_id:
        type: string
        description: "[required] UUID of canonical curve defining V direction"
    required: [curve_u_id, curve_v_id]
  topology_role: face
  kg_predicates: []
  synonyms: [sum-surface, translational-surface, addsumsrf, srf-sum]
  kernel: nurbs-webgpu
  alias_source: generic_cad_vocabulary
  note: "Creates a translational (sum) surface S(u,v) = C1(u) + C2(v) - basepoint. Requires two existing canonical curve objects. oracle: SumSurface.pointAtUV closed-form."

- name: SdEdgeSurface
  kernel_op: edgeSurface
  parameters:
    type: object
    properties:
      edges:
        type: array
        description: "[required] Array of 2–4 boundary curve UUIDs (Coons patch)"
    required: [edges]
  topology_role: face
  kg_predicates: []
  synonyms: [edge-surface, coons-patch, edgesrf, boundary-srf, patch-from-edges]
  kernel: nurbs-webgpu
  alias_source: generic_cad_vocabulary
  note: "STUB — blocked: requires kern_edgeSurface (Coons patch bilinear blending + boundary parameterization) in kern.wasm. C++ signature: Brep kern_edgeSurface(const ON_SimpleArray<ON_Curve*>& edges, double tolerance)."

- name: SdNetworkSurface
  kernel_op: networkSurface
  parameters:
    type: object
    properties:
      uCurves:
        type: array
        description: "[required] Array of curve UUIDs forming the U direction net"
      vCurves:
        type: array
        description: "[required] Array of curve UUIDs forming the V direction net"
    required: [uCurves, vCurves]
  topology_role: face
  kg_predicates: []
  synonyms: [network-surface, netsrf, curve-network-srf, networksrf]
  kernel: nurbs-webgpu
  alias_source: generic_cad_vocabulary
  note: "STUB — blocked: requires kern_networkSurface (least-squares NURBS fitting from curve net) in kern.wasm. C++ signature: Brep kern_networkSurface(const ON_SimpleArray<ON_Curve*>& uCurves, const ON_SimpleArray<ON_Curve*>& vCurves, double tolerance)."

- name: SdTorusSurfaceExact
  kernel_op: torusSurfaceExact
  parameters:
    type: object
    properties:
      majorRadius:
        type: number
        unit: m
        default: 1
        description: "[optional unit=m default=1] Major radius"
      minorRadius:
        type: number
        unit: m
        default: 0.3
        description: "[optional unit=m default=0.3] Minor radius (tube radius)"
    required: []
  topology_role: face
  kg_predicates: []
  synonyms: [torus-nurbs-exact, exact-torus-nurbs]
  kernel: nurbs-webgpu
  alias_source: generic_cad_vocabulary
  note: "STUB — blocked: requires kern_torusSurface_nurbs (exact 9×9 rational NURBS representation) in kern.wasm. C++ signature: ON_NurbsSurface kern_torusSurface_nurbs(double R, double r)."

- name: SdNurbsSurfaceDerivativesExact
  kernel_op: nurbsSurfaceDerivativesExact
  parameters:
    type: object
    properties:
      object_id:
        type: string
        description: "[required] UUID of an existing NURBS surface"
      u:
        type: number
        description: "[required] U parameter"
      v:
        type: number
        description: "[required] V parameter"
      order:
        type: integer
        default: 1
        description: "[optional] Derivative order"
    required: [object_id, u, v]
  topology_role: face
  kg_predicates: []
  synonyms: [exact-surface-derivatives, rational-srf-derivs]
  kernel: nurbs-webgpu
  alias_source: generic_cad_vocabulary
  note: "STUB — blocked: requires kern_evaluateSurfaceDerivatives_rational (exact rational Bézier extraction) in kern.wasm. C++ signature: bool kern_evaluateSurfaceDerivatives_rational(const ON_NurbsSurface& srf, double u, double v, int order, ON_3dPoint* pts)."

- name: SdTrimmedNurbsSurface
  kernel_op: trimmedNurbsSurface
  parameters:
    type: object
    properties:
      surface_id:
        type: string
        description: "[required] UUID of the base NURBS surface"
      trimCurves:
