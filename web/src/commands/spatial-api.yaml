- name: SdCurveLength
  kernel_op: measureCurveLength
  parameters:
    type: object
    properties:
      target:
        type: object_id
        description: "[required] UUID of a canonical curve or brep whose arc length to compute"
    required: [target]
  topology_role: annotation
  kg_predicates: []
  synonyms:
    - curve length
    - length of curve
    - measure curve
    - how long is this curve
    - perimeter
  note: |
    Arc-length via GL-16 Gaussian quadrature of ‖C′(t)‖ dt. Exact for line/arc kinds;
    relative tolerance 1e-5 for smooth NURBS degree ≥ 3.
    oracle: closed-form GL16; matches replicad CurveLengthComputer within 1e-5 relative.
  alias_source: generic_cad_vocabulary

- name: SdAreaCentroid
  kernel_op: measureAreaCentroid
  parameters:
    type: object
    properties:
      target:
        type: object_id
        description: "[required] UUID of a surface or brep whose area centroid to compute"
    required: [target]
  topology_role: annotation
  kg_predicates: []
  synonyms:
    - area centroid
    - surface centroid
    - centroid of surface
    - geometric center
    - center of mass surface
    - center of area
  note: |
    Area-weighted centroid from tessellated triangle mesh (Green's theorem).
    Oracle: area-weighted centroid of tessellateSurface triangulation;
    validated vs replicad/OCCT GProp_GProps (tol 1e-3 for smooth surfaces at 64×64 samples).
  alias_source: generic_cad_vocabulary

- name: SdBoundingBox
  kernel_op: measureBoundingBox
  parameters:
    type: object
    properties:
      target:
        type: object_id
        description: "[required] UUID of a scene object whose axis-aligned bounding box to compute"
    required: [target]
  topology_role: annotation
  kg_predicates: []
  synonyms:
    - bounding box
    - bbox
    - aabb
    - axis aligned bounding box
    - extent
    - bounds
    - how big is this object
    - object size
  note: |
    Returns { min, max, center, diagonal, volume } in model units (m).
    Computed via THREE.Box3.setFromObject (includes world transform); falls back to
    brep tessellation if object has no render geometry.
    oracle: THREE.Box3 — exact on rendered geometry.
  alias_source: generic_cad_vocabulary

- name: SdBoundingBoxOriented
  kernel_op: measureBoundingBoxOriented
  parameters:
    type: object
    properties:
      target:
        type: object_id
        description: "[required] UUID of a scene object whose oriented bounding box to compute"
    required: [target]
  topology_role: annotation
  kg_predicates: []
  synonyms:
    - oriented bounding box
    - obb
    - tight bounding box
    - minimum bounding box
    - oriented bbox
    - tight box
  note: |
    PCA-based OBB via Jacobi eigenvectors of covariance matrix.
    Returns { center, axes:[3×Vector3], halfExtents:[3], volume }.
    oracle: Jacobi 3×3; validated vs OCCT BRepBndLib::AddOBB for arbitrary-rotation inputs
    (tol 5% volume for typical NURBS surfaces with 32×32 samples).
  alias_source: generic_cad_vocabulary

