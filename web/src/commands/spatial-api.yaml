#   SdBooleanUnion          — already general via brepUnion backend dispatch
#   SdBooleanDifference     — already general via brepDifference backend dispatch
#   SdBooleanIntersection   — already general via brepIntersection backend dispatch

# ── SdBooleanSplit ─────────────────────────────────────────────────────────────
# Splits solid A along the surface of solid B, returning two sub-solids.
# Blocked until kern.wasm exports boolSplit(aJson, bJson).
# oracle: replicad split() — vol(A) + vol(B_result) ≈ vol(A_input)

- name: SdBooleanSplit
  kernel_op: boolSplit
  parameters:
    type: object
    properties:
      a:
        description: "[required] UUID of the solid to split"
        type: object_id
      b:
        description: "[required] UUID of the splitting tool solid"
        type: object_id
    required: [a, b]
  topology_role: compound
  kg_predicates: []
  synonyms: [split-solid, bool-split, boolean-split, divide-solid, split]
  kernel: replicad
  alias_source: generic_cad_vocabulary

# ── SdDifferenceWithIndexMap ───────────────────────────────────────────────────
# Boolean difference outer − inner, plus a face provenance index map.
# Each result face maps back to its source face in outer or inner.
# Blocked until kern.wasm exports boolDifferenceWithIndexMap(aJson, bJson).
# oracle: replicad cut() for result geometry;
#         closed-form: each result face has a deterministic source face.

- name: SdDifferenceWithIndexMap
