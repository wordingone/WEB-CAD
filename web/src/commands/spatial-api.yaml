        default: "[0,0]"
      radius:
        type: number
        unit: m
        default: 1
      startAngle:
        type: number
        unit: rad
        default: 0
      endAngle:
        type: number
        unit: rad
        default: 1.5708
    required: []
  topology_role: edge
  kg_predicates: []
  synonyms: [arc]
  kernel: replicad
  alias_source: generic_cad_vocabulary

- name: SdCircle
