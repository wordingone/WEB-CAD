      xAxis:
        type: point3
        description: "[required] Point along the width edge (defines X direction)"
      yAxis:
        type: point3
        description: "[required] Point along the height edge (defines Y direction)"
    required: [origin, xAxis, yAxis]
  topology_role: face
  kg_predicates: []
  synonyms: [plane, ref-plane, surface-plane]
  kernel: nurbs-webgpu
  alias_source: generic_cad_vocabulary

- name: SdSurface
