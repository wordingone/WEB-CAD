      curves:
        type: list_edge_or_surface
      closed:
        type: boolean
        default: false
      solid:
        type: boolean
        default: false
        description: "When true, closed planar section curves are committed as a capped closed BRep loft; otherwise the command preserves open loft-surface behavior."
    required: [curves]
  topology_role: solid
  kg_predicates: []
  synonyms: [loft, blend]
  kernel: nurbs-webgpu
  alias_source: generic_cad_vocabulary

- name: SdPlane
