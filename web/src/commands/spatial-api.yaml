    type: object
    properties:
      profile:
        type: edge_or_surface
      object_id:
        type: string
      distance:
        type: number
        unit: m
        default: 1
      direction:
        type: vector3
        default: "[0, 0, 1]"
    required: []
  topology_role: solid
  kg_predicates: [aggregatedBy]
  synonyms: [extrude, e, push]
  hotkey: E
  kernel: replicad
  alias_source: generic_cad_vocabulary

- name: SdRevolve
  ifc4_class: IfcRevolvedAreaSolid
  kernel_op: revolve
  parameters:
    type: object
    properties:
      profile:
        type: edge_or_surface
      axisFrom:
        type: point3
        default: "[0,0,0]"
      axisTo:
        type: point3
        default: "[0,0,1]"
      angleStart:
        type: number
        unit: rad
        default: 0
      angleEnd:
        type: number
        unit: rad
        default: 6.2832
      solid:
        type: boolean
        default: false
        description: "When true, full 360 degree revolutions of a valid line area profile are committed as capped closed BRep solids; otherwise the command preserves open revolution-surface behavior."
    required: [profile]
  topology_role: solid
  kg_predicates: []
  synonyms: [revolve, lathe]
  kernel: nurbs-webgpu
  alias_source: generic_cad_vocabulary

- name: SdSweep
  ifc4_class: IfcSweptDiskSolid
  kernel_op: sweep
  parameters:
    type: object
    properties:
      profile:
        type: edge_or_surface
      rail:
        type: curve
      solid:
        type: boolean
        default: false
        description: "When true, closed profile curves swept along a straight rail are committed as capped closed BRep solids; otherwise the command preserves open sweep-surface behavior."
    required: [profile, rail]
  topology_role: solid
  kg_predicates: []
  synonyms: [sweep]
  kernel: nurbs-webgpu
  alias_source: generic_cad_vocabulary

- name: SdLoft
